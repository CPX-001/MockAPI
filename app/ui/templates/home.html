<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>API Studio</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f8f6;
  --surface:#ffffff;
  --border:#e2e2dd;
  --text:#1a1a18;
  --muted:#6b6b66;
  --accent:#1a1a18;
  --tag-bg:#f0f0ec;
  --sans:'IBM Plex Sans',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column}

nav{background:var(--surface);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 2rem;gap:2rem}
.logo{font-family:var(--mono);font-size:.9rem;font-weight:600;color:var(--text);text-decoration:none}
nav a{font-size:.82rem;color:var(--muted);text-decoration:none;transition:color .15s}
nav a:hover,nav a.active{color:var(--text)}

main{flex:1;max-width:900px;width:100%;margin:0 auto;padding:3rem 2rem}

.page-title{font-size:1.6rem;font-weight:600;letter-spacing:-.02em;margin-bottom:.4rem}
.page-sub{font-size:.85rem;color:var(--muted);margin-bottom:2.5rem}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:2.5rem}
.stat{background:var(--surface);padding:1.25rem 1.5rem}
.stat-n{font-family:var(--mono);font-size:1.8rem;font-weight:600;line-height:1}
.stat-l{font-size:.75rem;color:var(--muted);margin-top:.3rem}

.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.section-hd h2{font-size:.9rem;font-weight:600}
.btn-sm{font-family:var(--sans);font-size:.78rem;padding:.4rem .9rem;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);cursor:pointer;text-decoration:none;transition:background .15s}
.btn-sm:hover{background:var(--tag-bg)}

.ep-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.ep-row{background:var(--surface);display:grid;grid-template-columns:80px 1fr 1fr;align-items:center;padding:.85rem 1.25rem;gap:1rem;transition:background .15s}
.ep-row:hover{background:var(--tag-bg)}
.badge{display:inline-block;font-family:var(--mono);font-size:.68rem;font-weight:600;padding:2px 7px;border-radius:4px;background:var(--tag-bg);color:var(--text);border:1px solid var(--border)}
.ep-path{font-family:var(--mono);font-size:.82rem}
.ep-desc{font-size:.8rem;color:var(--muted);text-align:right}

footer{border-top:1px solid var(--border);padding:1rem 2rem;text-align:center;font-size:.75rem;color:var(--muted);font-family:var(--mono)}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">api-studio</a>
  <a href="/" class="active">home</a>
  <a href="create_endpoint_form">endpoints</a>
</nav>

</body>
</html>
