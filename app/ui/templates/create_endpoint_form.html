<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Endpoints — API Studio</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f8f6;
  --surface:#ffffff;
  --border:#e2e2dd;
  --text:#1a1a18;
  --muted:#6b6b66;
  --tag-bg:#f0f0ec;
  --danger:#c0392b;
  --sans:'IBM Plex Sans',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column}

nav{background:var(--surface);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 2rem;gap:2rem}
.logo{font-family:var(--mono);font-size:.9rem;font-weight:600;color:var(--text);text-decoration:none}
nav a{font-size:.82rem;color:var(--muted);text-decoration:none;transition:color .15s}
nav a:hover,nav a.active{color:var(--text)}

main{flex:1;max-width:900px;width:100%;margin:0 auto;padding:3rem 2rem}

h1{font-size:1.6rem;font-weight:600;letter-spacing:-.02em;margin-bottom:.4rem}
.page-sub{font-size:.85rem;color:var(--muted);margin-bottom:2.5rem}

.grid{display:grid;grid-template-columns:1fr 320px;gap:1.5rem;align-items:start}
@media(max-width:720px){.grid{grid-template-columns:1fr}}

.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.5rem;margin-bottom:1rem}
.card:last-child{margin-bottom:0}
.card-title{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid var(--border);font-family:var(--mono)}

label{display:block;font-size:.78rem;font-weight:500;color:var(--muted);margin-bottom:.35rem}
input,select,textarea{
  width:100%;padding:.55rem .75rem;font-family:var(--mono);font-size:.82rem;
  border:1px solid var(--border);border-radius:6px;background:var(--surface);
  color:var(--text);outline:none;transition:border-color .15s;appearance:none
}
input:focus,select:focus,textarea:focus{border-color:#999}
textarea{resize:vertical;min-height:70px;font-family:var(--sans)}

.field{margin-bottom:1rem}
.field:last-of-type{margin-bottom:0}
.row2{display:grid;grid-template-columns:110px 1fr;gap:.75rem}

/* schema */
.schema-head{display:grid;grid-template-columns:1fr 100px 72px 32px;gap:.5rem;font-size:.7rem;color:var(--muted);margin-bottom:.5rem;padding:0 2px;font-family:var(--mono)}
#schema-rows{display:flex;flex-direction:column;gap:.5rem;margin-bottom:.75rem}
.schema-row{display:grid;grid-template-columns:1fr 100px 72px 32px;gap:.5rem;align-items:center}
.schema-row input,.schema-row select{margin:0}
.req-wrap{display:flex;align-items:center;justify-content:center;gap:5px;font-size:.75rem;color:var(--muted);cursor:pointer;user-select:none}
.req-wrap input{width:auto;cursor:pointer;accent-color:var(--text)}

.btn-del{width:32px;height:32px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--muted);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .15s,border-color .15s;flex-shrink:0}
.btn-del:hover{color:var(--danger);border-color:var(--danger)}

.btn-add{width:100%;padding:.5rem;border:1px dashed var(--border);border-radius:6px;background:none;font-family:var(--sans);font-size:.8rem;color:var(--muted);cursor:pointer;transition:color .15s,border-color .15s;margin-bottom:1.25rem}
.btn-add:hover{color:var(--text);border-color:#999}

.btn-submit{width:100%;padding:.7rem;background:var(--text);color:#fff;border:none;border-radius:6px;font-family:var(--sans);font-size:.85rem;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-submit:hover{opacity:.85}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}

/* preview */
.preview-block{background:var(--tag-bg);border:1px solid var(--border);border-radius:6px;padding:1rem;font-family:var(--mono);font-size:.76rem;line-height:1.7;white-space:pre-wrap;word-break:break-all;max-height:380px;overflow-y:auto;color:#333}

#toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface);border:1px solid var(--border);font-size:.8rem;padding:.65rem 1.1rem;border-radius:6px;display:none;box-shadow:0 2px 8px rgba(0,0,0,.08)}

footer{border-top:1px solid var(--border);padding:1rem 2rem;text-align:center;font-size:.75rem;color:var(--muted);font-family:var(--mono)}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">api-studio</a>
  <a href="/index.html">home</a>
  <a href="/endpoints.html" class="active">endpoints</a>
</nav>

<main>
  <h1>Nuevo endpoint</h1>
  <p class="page-sub">Define el método, path y el schema de campos.</p>

  <div class="grid">
    <div>
      <!-- endpoint config -->
      <div class="card">
        <p class="card-title">Configuración</p>

        <div class="field row2">
          <div>
            <label>Método</label>
            <select id="ep-method">
              <option>GET</option>
              <option selected>POST</option>
              <option>PUT</option>
              <option>PATCH</option>
              <option>DELETE</option>
            </select>
          </div>
          <div>
            <label>Path</label>
            <input type="text" id="ep-path" placeholder="/api/recurso"/>
          </div>
        </div>

        <div class="field">
          <label>Descripción</label>
          <input type="text" id="ep-desc" placeholder="Qué hace este endpoint"/>
        </div>
      </div>

      <!-- schema -->
      <div class="card">
        <p class="card-title">Schema de campos</p>

        <div class="schema-head">
          <span>nombre</span><span>tipo</span><span>requerido</span><span></span>
        </div>

        <div id="schema-rows"></div>

        <button class="btn-add" id="btn-add">+ añadir campo</button>
        <button class="btn-submit" id="btn-submit">Guardar endpoint</button>
      </div>
    </div>

    <!-- preview -->
    <div style="position:sticky;top:1.5rem">
      <div class="card">
        <p class="card-title">Preview JSON</p>
        <pre class="preview-block" id="preview">{}</pre>
      </div>
    </div>
  </div>
</main>

<footer>api-studio</footer>
<div id="toast"></div>

<script>
const TYPES = ['string','integer','number','boolean','array','object'];
const ENDPOINTS_API_URL = 'http://localhost:8000/endpoint';
let rows = [], uid = 0;

const schemaRows = document.getElementById('schema-rows');
const preview    = document.getElementById('preview');
const epMethod   = document.getElementById('ep-method');
const epPath     = document.getElementById('ep-path');
const epDesc     = document.getElementById('ep-desc');
const btnAdd     = document.getElementById('btn-add');
const btnSubmit  = document.getElementById('btn-submit');
const toast      = document.getElementById('toast');

function renderRows() {
  schemaRows.innerHTML = '';
  rows.forEach(r => {
    const div = document.createElement('div');
    div.className = 'schema-row';
    div.innerHTML = `
      <input type="text" placeholder="nombre" value="${r.name}" data-f="name"/>
      <select data-f="type">${TYPES.map(t=>`<option${t===r.type?' selected':''}>${t}</option>`).join('')}</select>
      <label class="req-wrap"><input type="checkbox" data-f="required"${r.req?' checked':''}/> req</label>
      <button class="btn-del" title="Eliminar">×</button>`;
    div.querySelectorAll('[data-f]').forEach(el=>{
      el.addEventListener('change',()=>sync(r.id,el));
      el.addEventListener('input', ()=>sync(r.id,el));
    });
    div.querySelector('.btn-del').addEventListener('click',()=>{rows=rows.filter(x=>x.id!==r.id);renderRows();updatePreview()});
    schemaRows.appendChild(div);
  });
  updatePreview();
}

function sync(id,el){
  const r=rows.find(x=>x.id===id);if(!r)return;
  if(el.type==='checkbox') r.req=el.checked;
  else r[el.dataset.f]=el.value;
  updatePreview();
}

function payload(){
  const schema={};
  rows.forEach(r=>{if(r.name.trim())schema[r.name.trim()]={type:r.type,required:r.req}});
  return {method:epMethod.value,path:epPath.value,description:epDesc.value,schema};
}

function updatePreview(){preview.textContent=JSON.stringify(payload(),null,2)}

[epMethod,epPath,epDesc].forEach(el=>el.addEventListener('input',updatePreview));
epMethod.addEventListener('change',updatePreview);

btnAdd.addEventListener('click',()=>{
  rows.push({id:uid++,name:'',type:'string',req:false});
  renderRows();
  schemaRows.querySelectorAll('[data-f="name"]').at(-1)?.focus();
});

btnSubmit.addEventListener('click',async()=>{
  const path=epPath.value.trim();
  if(!path){showToast('Path es obligatorio');return}
  btnSubmit.disabled=true;btnSubmit.textContent='Enviando…';
  try{
    const r=await fetch(ENDPOINTS_API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())});
    showToast(r.ok?'Guardado correctamente':`Error ${r.status}`);
  }catch(e){showToast('Error de red: '+e.message)}
  finally{btnSubmit.disabled=false;btnSubmit.textContent='Guardar endpoint'}
});

let t;
function showToast(msg){clearTimeout(t);toast.textContent=msg;toast.style.display='block';t=setTimeout(()=>toast.style.display='none',3000)}

// init
rows.push({id:uid++,name:'',type:'string',req:false});
renderRows();
</script>
</body>
</html>
